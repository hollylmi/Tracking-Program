<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password &mdash; Plytrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#2F2F2F; font-family:'Montserrat',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:420px; border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,0.35); overflow:hidden; }
    .login-header { background:#2F2F2F; border-bottom:3px solid #FFB7C5; padding:2rem; text-align:center; }
    .login-header .brand-name { color:#FFB7C5; font-weight:800; font-size:1.5rem; letter-spacing:0.06em; }
    .login-body { background:#fff; padding:2rem; }
    .btn-ply { background:#FFB7C5; border:none; color:#2F2F2F; font-weight:700; }
    .btn-ply:hover { background:#e8899a; color:#fff; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="brand-name">PLYTRACK</div>
    <div style="color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:0.25rem;">Set New Password</div>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">New Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" required autofocus
                 placeholder="At least 6 characters" minlength="6">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" name="confirm" required
                 placeholder="Confirm your password" minlength="6">
        </div>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-ply btn-lg">
          <i class="bi bi-check-lg me-1"></i>Reset Password
        </button>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
