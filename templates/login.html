<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &mdash; Plytrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #2F2F2F;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .login-header {
      background: #2F2F2F;
      border-bottom: 3px solid #FFB7C5;
      padding: 2.5rem 2rem 1.75rem;
      text-align: center;
    }
    .login-header .brand-name {
      color: #FFB7C5;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .login-header .brand-sub {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }
    .login-body {
      background: #fff;
      padding: 2rem;
    }
    .btn-ply {
      background: #FFB7C5;
      border: none;
      color: #2F2F2F;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .btn-ply:hover {
      background: #e8899a;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <!-- Plytrack logo mark -->
    <svg width="48" height="42" viewBox="0 0 48 42" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-2">
      <text x="0" y="38" font-family="Montserrat, sans-serif" font-weight="800" font-size="40" fill="#FFB7C5">P</text>
      <line x1="27" y1="38" x2="38" y2="8" stroke="#FFB7C5" stroke-width="4" stroke-linecap="round"/>
      <line x1="34" y1="38" x2="45" y2="8" stroke="#FFB7C5" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="brand-name">Plytrack</div>
    <div class="brand-sub">Daily Installation Log</div>
  </div>
  <div class="login-body">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" required autofocus
                 placeholder="Enter your username">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" required
                 placeholder="Enter your password">
        </div>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="remember" name="remember">
        <label class="form-check-label" for="remember">Keep me logged in</label>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-ply btn-lg">
          <i class="bi bi-box-arrow-in-right me-1"></i>Log In
        </button>
      </div>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
